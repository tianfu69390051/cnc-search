<style>

  body{font-family:-apple-system,'Noto Sans TC',Arial,sans-serif;background:#F0F4F8;min-height:100vh}
  .header{background:linear-gradient(135deg,#1a3a5c,#2d6a9f);color:white;padding:18px 16px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .header h1{font-size:20px;font-weight:700;letter-spacing:1px}
  .header p{font-size:12px;opacity:.8;margin-top:4px}
  .search-box{background:white;padding:16px;margin:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .search-row{display:flex;gap:8px;align-items:center}
  input[type=text]{flex:1;font-size:18px;padding:12px 14px;border:2px solid #CBD5E0;border-radius:10px;outline:none;transition:border-color .2s;-webkit-appearance:none}
  input[type=text]:focus{border-color:#2d6a9f}
  .btn-clear{background:#E2E8F0;border:none;border-radius:10px;padding:12px 14px;font-size:18px;cursor:pointer;color:#4A5568}
  .filter-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .filter-btn{padding:6px 12px;border:2px solid #CBD5E0;border-radius:20px;background:white;font-size:13px;cursor:pointer;color:#4A5568;transition:all .15s}
  .filter-btn.active{background:#2d6a9f;border-color:#2d6a9f;color:white;font-weight:600}
  .stats{text-align:center;font-size:13px;color:#718096;margin:0 16px 8px}
  .results{margin:0 12px 80px}
  .result-card{background:white;border-radius:10px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .badge{font-size:12px;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;min-width:36px;text-align:center}
  .badge-車1{background:#DBEAFE;color:#1D4ED8}.badge-車2{background:#D1FAE5;color:#065F46}
  .badge-車3{background:#FEF3C7;color:#92400E}.badge-車4{background:#FCE7F3;color:#9D174D}
  .badge-車5{background:#EDE9FE;color:#5B21B6}.badge-銑1{background:#FFEDD5;color:#9A3412}
  .badge-銑2{background:#F0FDF4;color:#166534}
  .card-info{flex:1}
  .prog-no{font-size:22px;font-weight:800;color:#1a3a5c;line-height:1.2}
  .tuhao{font-size:14px;color:#4A5568;margin-top:2px}
  .highlight{background:#FEF08A;border-radius:3px;padding:0 2px}
  .empty{text-align:center;padding:40px 20px;color:#A0AEC0}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .total-count{background:#EBF8FF;color:#2B6CB0;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;display:inline-block;margin-top:6px}
  .footer{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E2E8F0;padding:8px 16px;text-align:center;font-size:11px;color:#A0AEC0}
</style>
</head>

let currentFilter='全部',searchTimer=null;
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===f));
  doSearch();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  doSearch();
  document.getElementById('searchInput').focus();
}
function highlight(text,query){
  if(!query)return text;
  const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,'gi'),m=>`<span class="highlight">${m}</span>`);
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toUpperCase();
  const filtered=DATA.filter(([she,prog,tuhao])=>{
    if(currentFilter!=='全部'&&she!==currentFilter)return false;
    if(!q)return true;
    return prog.toUpperCase().includes(q)||tuhao.toUpperCase().includes(q);
  });
  const stats=document.getElementById('stats');
  const results=document.getElementById('results');
  if(!q&&currentFilter==='全部'){
    stats.innerHTML=`<span class="total-count">共 ${DATA.length} 筆資料</span>`;
    results.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>輸入圖號或程式編號開始查詢</p></div>`;
    return;
  }
  stats.innerHTML=`找到 <strong>${filtered.length}</strong> 筆結果`;
  if(filtered.length===0){
    results.innerHTML=`<div class="empty"><div class="empty-icon">😅</div><p>查無資料，請確認輸入內容</p></div>`;
    return;
  }
  const MAX=100;
  results.innerHTML=filtered.slice(0,MAX).map(([she,prog,tuhao])=>`
    <div class="result-card">
      <span class="badge badge-${she}">${she}</span>
      <div class="card-info">
        <div class="prog-no">${highlight(prog,q)}</div>
        <div class="tuhao">${highlight(tuhao,q)}</div>
      </div>
    </div>`).join('')+(filtered.length>MAX?`<div class="stats">僅顯示前${MAX}筆，請輸入更精確關鍵字</div>`:'');
}
document.getElementById('searchInput').addEventListener('input',()=>{
  clearTimeout(searchTimer);searchTimer=setTimeout(doSearch,150);
});
